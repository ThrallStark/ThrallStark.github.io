<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- 恢复原始标题 -->
    <title>刘昊辰 - 资深车联网产品经理</title>
    <script type="module" crossorigin="" src="./assets/index-Cj8vkcV3.js"></script>
    <link rel="stylesheet" crossorigin="" href="./assets/index-DsZLHQ96.css"/>
    <style>
        /* 返回首页按钮 - 统一尺寸，适配浅灰背景 */
        .back-home-btn {
            /* 固定尺寸 */
            width: 120px;
            height: 36px;
            padding: 8px 16px;
            box-sizing: border-box;
            
            /* 统一样式 */
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            border-radius: 20px;
            
            /* 布局 */
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            
            /* 颜色适配浅灰背景 */
            background: #6b7280; /* 深灰色，与浅灰背景形成良好对比 */
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(107, 114, 128, 0.3);
            
            /* 交互效果 */
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-home-btn::before {
            content: "←";
            font-size: 16px;
        }

        .back-home-btn:hover {
            background: #4b5563;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 114, 128, 0.4);
        }
        
        /* 确保按钮在React应用上方 */
        #root {
            position: relative;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .back-home-btn {
                top: 10px;
                left: 10px;
                width: 100px;
                height: 32px;
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回首页按钮 -->
    <a href="https://thrallstark.site" class="back-home-btn">返回首页</a>
    
    <div id="root"></div>
    
    <!-- 添加JavaScript来删除导航栏左上角的"刘昊辰" -->
    
    <!-- 改进的JavaScript：可靠删除导航栏左上角的"刘昊辰" -->
    <script>
        (function() {
            console.log('开始删除导航栏左上角的"刘昊辰"...');
            
            // 多个策略来查找和删除
            function findAndRemoveNavLiuHaochen() {
                // 策略1: 查找左上角区域的"刘昊辰"
                const allElements = document.querySelectorAll('*');
                let foundElement = null;
                
                for (let element of allElements) {
                    if (element.textContent && element.textContent.trim() === '刘昊辰') {
                        const rect = element.getBoundingClientRect();
                        
                        // 检查是否在左上角区域
                        if (rect.top < 100 && rect.left < 200) {
                            console.log('找到左上角的"刘昊辰"元素:', element);
                            foundElement = element;
                            break;
                        }
                    }
                }
                
                // 策略2: 查找导航栏相关的元素
                if (!foundElement) {
                    const navElements = document.querySelectorAll('nav *, header *, .navbar *, .nav *, [class*="nav"], [class*="header"]');
                    for (let element of navElements) {
                        if (element.textContent && element.textContent.trim() === '刘昊辰') {
                            console.log('找到导航栏的"刘昊辰"元素:', element);
                            foundElement = element;
                            break;
                        }
                    }
                }
                
                // 策略3: 查找hover会变色的元素
                if (!foundElement) {
                    const allWithHover = document.querySelectorAll('[class*="hover"], [style*="hover"], :hover');
                    for (let element of allWithHover) {
                        if (element.textContent && element.textContent.includes('刘昊辰')) {
                            console.log('找到可能hover变色的"刘昊辰"元素:', element);
                            foundElement = element;
                            break;
                        }
                    }
                }
                
                // 删除找到的元素
                if (foundElement && foundElement.parentElement) {
                    try {
                        foundElement.parentElement.removeChild(foundElement);
                        console.log('✅ 成功删除导航栏左上角的"刘昊辰"');
                        return true;
                    } catch (e) {
                        console.error('删除元素失败:', e);
                    }
                }
                
                return false;
            }
            
            // 页面加载后立即执行
            document.addEventListener('DOMContentLoaded', function() {
                console.log('DOM已加载，开始查找...');
                
                // 初始尝试
                if (!findAndRemoveNavLiuHaochen()) {
                    console.log('初始查找未成功，等待React加载...');
                    
                    // 延迟多次尝试（React可能需要时间加载）
                    const maxAttempts = 5;
                    let attempts = 0;
                    
                    const interval = setInterval(function() {
                        attempts++;
                        console.log(`第${attempts}次尝试查找...`);
                        
                        if (findAndRemoveNavLiuHaochen()) {
                            clearInterval(interval);
                            console.log('✅ 最终成功删除"刘昊辰"');
                        } else if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            console.log('⚠️ 达到最大尝试次数，可能已删除或结构不同');
                        }
                    }, 1000); // 每秒尝试一次
                }
            });
        })();
    </script>

</body>
</html>
