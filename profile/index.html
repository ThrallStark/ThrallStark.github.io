    <style>
        /* 返回首页按钮 - 统一尺寸，适配浅灰背景 */
        .back-home-btn {
            /* 固定尺寸 */
            width: 120px;
            height: 36px;
            padding: 8px 16px;
            box-sizing: border-box;
            
            /* 统一样式 */
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            border-radius: 20px;
            
            /* 布局 */
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 40;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            
            /* 颜色适配浅灰背景 */
            background: #6b7280; /* 深灰色，与浅灰背景形成良好对比 */
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(107, 114, 128, 0.3);
            
            /* 交互效果 */
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-home-btn::before {
            content: "←";
            font-size: 16px;
        }

        .back-home-btn:hover {
            background: #4b5563;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 114, 128, 0.4);
        }
        
        /* 确保按钮在React应用上方 */
        #root {
            position: relative;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .back-home-btn {
                top: 10px;
                left: 10px;
                width: 100px;
                height: 32px;
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>

<body>
    <!-- 返回首页按钮 -->
    <a href="/" class="back-home-btn">返回首页</a>
    
    <div id="root"></div>
    
    <!-- 移除 React 应用导航栏中的品牌文字 -->
    <script>
        (function() {
            var targetText = '刘昊辰';
            var root = document.getElementById('root');
            if (!root) return;

            function removeTarget() {
                var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
                var node;
                while ((node = walker.nextNode())) {
                    if (node.textContent.trim() === targetText) {
                        var el = node.parentElement;
                        if (el) {
                            el.remove();
                            return true;
                        }
                    }
                }
                return false;
            }

            // 若 React 已渲染则直接移除
            if (removeTarget()) return;

            // 监听 React 动态挂载，仅在 DOM 变化时触发（无轮询）
            var observer = new MutationObserver(function() {
                if (removeTarget()) {
                    observer.disconnect();
                }
            });

            observer.observe(root, { childList: true, subtree: true });

            // 10 秒后自动停止监听，防止内存泄漏
            setTimeout(function() {
                observer.disconnect();
            }, 10000);
        })();
    </script>

    <!-- 防闪烁：等字体和关键资源加载完成后再淡入显示 -->
    <script>
        (function() {
            function showApp() {
                document.documentElement.classList.add('app-ready');
            }
            // 等待字体加载 + 页面 load 事件
            var promises = [];
            if (document.fonts && document.fonts.ready) {
                promises.push(document.fonts.ready);
            }
            promises.push(new Promise(function(resolve) {
                if (document.readyState === 'complete') resolve();
                else window.addEventListener('load', resolve);
            }));
            Promise.all(promises).then(showApp);
            // 兜底：最长 1.5 秒后强制显示，避免网络极差时白屏太久
            setTimeout(showApp, 1500);
        })();
    </script>

</body>
