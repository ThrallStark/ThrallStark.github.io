<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的报告 · ThrallStark</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(201,168,76,0.3);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.1);
    --green: #4ade80;
    --purple: #a78bfa;
    --text: #f0f2f5;
    --text2: #9ca3af;
    --text3: #6b7280;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.18;
    filter: grayscale(30%) brightness(0.4) blur(1px);
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(74,222,128,0.04) 0%, transparent 50%),
      linear-gradient(180deg, rgba(7,9,15,0.7) 0%, rgba(7,9,15,0.92) 60%, rgba(7,9,15,1) 100%);
  }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 64px 0 0;
    text-align: center;
  }
  .avatar-ring {
    display: inline-block;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold), rgba(201,168,76,0.3));
    margin-bottom: 20px;
  }
  .avatar-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .header-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .header-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 24px;
  }

  /* Hero title */
  .hero-title {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff 40%, rgba(255,255,255,0.5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 0;
  }

  /* Reports section */
  .reports-section {
    padding: 80px 0 60px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::before,
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Report cards */
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .report-card {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .report-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
  }
  .report-card:hover {
    background: var(--card-hover);
    border-color: var(--border-gold);
    transform: translateX(6px);
  }
  .report-card:hover::before { opacity: 1; }

  .report-card-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .report-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .report-card:nth-child(1) .report-icon { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.15); }
  .report-card:nth-child(2) .report-icon { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.15); }
  .report-card:nth-child(3) .report-icon { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.15); }

  .report-content { flex: 1; min-width: 0; }
  .report-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 5px;
    color: var(--text);
  }
  .report-desc {
    font-size: 13px;
    color: var(--text2);
    font-weight: 300;
    margin-bottom: 8px;
  }
  .report-meta {
    font-size: 12px;
    color: var(--text3);
  }
  .report-meta span {
    margin-right: 16px;
  }

  .report-arrow {
    font-size: 20px;
    color: var(--text3);
    flex-shrink: 0;
    transition: transform 0.3s, color 0.3s;
  }
  .report-card:hover .report-arrow {
    transform: translateX(4px);
    color: var(--gold);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 0 60px;
    color: var(--text3);
    font-size: 12px;
  }
  footer a { color: var(--gold); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .report-card { padding: 20px; }
    .report-card-inner { gap: 14px; }
    .report-icon { width: 44px; height: 44px; font-size: 20px; }
    .report-title { font-size: 15px; }
    .report-arrow { display: none; }
  }
</style>
</head>
<body>

<div class="bg">
  <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80" alt="">
</div>

<div class="container">
  <header>
    <div class="avatar-ring">
      <img src="https://avatars.githubusercontent.com/u/13826651?v=4" alt="ThrallStark">
    </div>
    <div class="header-name">ThrallStark</div>
    <div class="header-divider"></div>
    <h1 class="hero-title">我的报告</h1>
    <p class="hero-sub">深度研究 · 数据洞察</p>
  </header>

  <section class="reports-section">
    <div class="section-label">Research Reports</div>

    <div class="report-list">
      <!-- 新能源汽车报告 -->
      <a class="report-card" href="https://ThrallStark.github.io/report/新能源汽车2026趋势分析.html">
        <div class="report-card-inner">
          <div class="report-icon">🚗</div>
          <div class="report-content">
            <div class="report-title">新能源汽车2026趋势分析报告</div>
            <div class="report-desc">2026年销量趋势、原材料成本、利好行业与求职机会深度分析</div>
            <div class="report-meta">
              <span>🚗 汽车行业</span>
              <span>📅 2026年3月</span>
            </div>
          </div>
          <div class="report-arrow">→</div>
        </div>
      </a>

      <!-- 杭州AI机器人报告 -->
      <a class="report-card" href="https://ThrallStark.github.io/report/杭州AI机器人公司分析.html">
        <div class="report-card-inner">
          <div class="report-icon">🤖</div>
          <div class="report-content">
            <div class="report-title">2026年杭州成长潜力公司分析</div>
            <div class="report-desc">机器人 · 原生AI · AI消费硬件三大赛道深度研究，附求职机会</div>
            <div class="report-meta">
              <span>🧠 AI / 机器人</span>
              <span>📅 2026年3月</span>
            </div>
          </div>
          <div class="report-arrow">→</div>
        </div>
      </a>
    </div>
  </section>

  
<footer>
    <p>Generated by <a href="https://github.com/ThrallStark" target="_blank">@ThrallStark</a> · AI-Powered Research</p>
  </footer>
</div>

</body>
</html>
