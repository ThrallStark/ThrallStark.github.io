<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究报告 - 昊辰的星辰大海</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        :root {
            --cyan: #06b6d4;
            --cyan-light: #22d3ee;
            --purple: #8b5cf6;
            --dark: #0f172a;
            --gray: #64748b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        
        .report-page {
            min-height: 100vh;
            padding: 100px 24px 60px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .gold-line {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #06b6d4, #8b5cf6);
            margin: 0 auto 16px;
            border-radius: 2px;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }
        
        .page-header p {
            color: #64748b;
            font-size: 1rem;
        }
        
        /* 报告卡片 */
        .report-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
            display: block;
            text-decoration: none;
        }
        
        .report-card:hover {
            transform: translateY(-4px);
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.15);
        }
        
        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .report-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }
        
        .report-card:hover .report-title {
            color: #06b6d4;
        }
        
        .report-meta {
            display: flex;
            gap: 16px;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .report-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
            border-radius: 9999px;
            font-size: 0.75rem;
        }
        
        .report-desc {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .report-stats {
            display: flex;
            gap: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #06b6d4;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .report-arrow {
            color: #64748b;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        
        .report-card:hover .report-arrow {
            color: #06b6d4;
            transform: translateX(4px);
        }
        
        /* 文字版入口 */
        .text-version {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .text-version h2 {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        .text-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .text-link:hover {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.8rem;
            }
            
            .report-card {
                padding: 24px;
            }
            
            .report-stats {
                flex-wrap: wrap;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="report-page">
        <div class="container">
            <div class="page-header">
                <div class="gold-line"></div>
                <h1>研究报告</h1>
                <p>深度洞察，数据驱动，决策支持</p>
            </div>
            
            <!-- 报告列表 -->
            <div class="report-list">
                <a href="/report/ai-cost-analysis.html" class="report-card">
                    <div class="report-card-header">
                        <div>
                            <h3 class="report-title">AI成本全景分析</h3>
                            <div class="report-meta">
                                <span>📅 2025年3月</span>
                                <span>⏱️ 约15分钟阅读</span>
                            </div>
                        </div>
                        <span class="report-tag">深度研究</span>
                    </div>
                    <p class="report-desc">从算力采购到电力消耗，从人才薪资到数据标注，深度拆解AI应用背后的真实成本结构。涵盖训练成本、推理成本、人力成本、全链条成本分析及优化策略。</p>
                    <div class="report-stats">
                        <div class="stat-item">
                            <div class="stat-value">$78M</div>
                            <div class="stat-label">GPT-4训练成本</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">99.5%</div>
                            <div class="stat-label">推理成本降幅</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">945TWh</div>
                            <div class="stat-label">2030预测耗电</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">→</div>
                            <div class="stat-label">查看报告</div>
                        </div>
                    </div>
                </a>
            </div>
            
            <!-- 文字版入口 -->
            <div class="text-version">
                <h2>📄 文字版报告</h2>
                <a href="/report/ai-cost-analysis-text.html" class="text-link">
                    <span>AI成本全景分析（文字版）</span>
                    <span>→</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
