<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字版报告</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
                         "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #020617 0%, #081021 30%, #0f1a30 70%, #1a253c 100%);
            background-attachment: fixed;
            color: #cbd5e1;
            line-height: 1.9;
            letter-spacing: 0.01em;
            min-height: 100vh;
            font-size: 17px;
        }

        /* 阅读进度条 */
        .progress-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: rgba(255,255,255,0.05);
            z-index: 2000;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #06b6d4, #8b5cf6);
            transition: width 0.1s linear;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(6, 182, 212, 0.9);
            color: white;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .back-btn:hover {
            background: #0891b2;
            transform: translateY(-2px);
        }

        /* 目录导航 (TOC) */
        .toc {
            position: fixed;
            top: 80px;
            right: 24px;
            width: 230px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.25);
            border-radius: 12px;
            padding: 16px;
            z-index: 100;
            font-size: 13px;
            line-height: 1.6;
        }
        .toc::-webkit-scrollbar { width: 4px; }
        .toc::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.4); border-radius: 4px; }
        .toc-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.25);
        }
        .toc ul { list-style: none; margin: 0; padding: 0; }
        .toc li { margin-bottom: 5px; }
        .toc a {
            color: #64748b;
            text-decoration: none;
            display: block;
            padding: 3px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toc a:hover, .toc a.active {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
        }
        .toc-h3 { padding-left: 12px; font-size: 12px; }

        /* 正文容器 */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 100px 24px 120px;
        }

        /* Markdown 渲染样式 */
        #content h1 {
            color: #fff;
            font-size: 2.2rem;
            margin: 0 0 2rem;
            font-weight: 700;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }
        #content h2 {
            color: #06b6d4;
            font-size: 1.5rem;
            margin: 3rem 0 1.2rem;
            font-weight: 600;
            line-height: 1.4;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.25);
            scroll-margin-top: 80px;
        }
        #content h3 {
            color: #a78bfa;
            font-size: 1.2rem;
            margin: 2rem 0 1rem;
            font-weight: 600;
            line-height: 1.4;
            scroll-margin-top: 80px;
        }
        #content p {
            margin-bottom: 1.2rem;
            color: #cbd5e1;
            text-align: left;
            text-indent: 2em;
        }
        /* 特定位置段落不缩进 */
        #content h1 + p, #content h2 + p, #content h3 + p,
        #content blockquote + p, #content pre + p, #content .table-wrapper + p,
        #content ul + p, #content ol + p { text-indent: 0; }
        #content blockquote p { text-indent: 0; margin-bottom: 0.6rem; }
        #content blockquote p:last-child { margin-bottom: 0; }

        #content strong { color: #f1f5f9; font-weight: 600; }
        #content em { color: #94a3b8; font-style: italic; }
        #content a {
            color: #22d3ee;
            text-decoration: none;
            border-bottom: 1px solid rgba(34, 211, 238, 0.3);
            transition: all 0.2s;
        }
        #content a:hover { border-bottom-color: #22d3ee; }
        #content hr {
            border: none;
            border-top: 1px solid rgba(71, 85, 105, 0.35);
            margin: 2.5rem 0;
        }
        #content blockquote {
            border-left: 3px solid #06b6d4;
            padding: 1rem 1rem 1rem 1.2rem;
            margin: 1.5rem 0;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        #content ul, #content ol { margin: 1.2rem 0 1.2rem 2rem; }
        #content li {
            margin-bottom: 0.6rem;
            color: #cbd5e1;
            line-height: 1.8;
        }
        #content li > p { text-indent: 0; margin-bottom: 0.3rem; }
        #content code {
            background: rgba(30, 41, 59, 0.9);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.88em;
            color: #22d3ee;
            font-family: "SF Mono", "Fira Code", Monaco, "Cascadia Code", monospace;
        }
        #content pre {
            background: rgba(10, 15, 30, 0.8);
            padding: 18px 20px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid rgba(71, 85, 105, 0.25);
        }
        #content pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
            font-size: 0.85em;
            line-height: 1.7;
        }

        /* 表格：外层 wrapper 支持横向滚动 */
        .table-wrapper {
            overflow-x: auto;
            margin: 1.5rem 0;
            border-radius: 8px;
            border: 1px solid rgba(71, 85, 105, 0.25);
        }
        #content table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 480px;
        }
        #content th, #content td {
            padding: 10px 14px;
            border: 1px solid rgba(71, 85, 105, 0.35);
            text-align: left;
        }
        #content th {
            background: rgba(30, 41, 59, 0.7);
            color: #06b6d4;
            font-weight: 600;
        }
        #content tr:nth-child(even) { background: rgba(30, 41, 59, 0.15); }
        #content tr:hover { background: rgba(255,255,255,0.04); }

        /* 加载 / 错误 */
        .loading, .error { text-align: center; padding: 120px 0; font-size: 1.1rem; }
        .loading { color: #64748b; }
        .error { color: #ef4444; }

        /* 响应式 */
        @media (max-width: 1200px) {
            .toc { display: none; }
        }
        @media (max-width: 768px) {
            body { font-size: 16px; line-height: 1.85; }
            .container { padding: 80px 16px 80px; }
            #content h1 { font-size: 1.7rem; }
            #content h2 { font-size: 1.25rem; margin-top: 2rem; }
            #content h3 { font-size: 1.1rem; }
            .back-btn { top: 10px; left: 10px; padding: 6px 12px; font-size: 12px; }
            .progress-bar { height: 2px; }
            #content p { text-indent: 1.5em; }
            #content table { min-width: 360px; }
        }

        /* 打印友好 */
        @media print {
            body {
                background: white !important;
                color: #1a1a1a !important;
                font-size: 11pt;
                line-height: 1.6;
            }
            .progress-bar, .back-btn, .toc { display: none !important; }
            #content h1, #content h2, #content h3 { color: #1a1a1a !important; page-break-after: avoid; }
            #content a { color: #0066cc !important; border-bottom: none !important; }
            #content blockquote { background: #f5f5f5 !important; border-left-color: #999 !important; }
            #content pre { background: #f5f5f5 !important; border: 1px solid #ddd !important; }
            #content code { background: #f0f0f0 !important; color: #333 !important; }
            #content th { background: #eee !important; color: #333 !important; }
            #content tr:nth-child(even) { background: #f9f9f9 !important; }
            .container { padding: 20px !important; max-width: 100% !important; }
            #content p { text-indent: 2em; }
        }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <a href="/report/" class="back-btn" id="backBtn">← 返回报告列表</a>
    <nav class="toc" id="toc"></nav>
    <div class="container">
        <div id="content" class="loading">正在加载文字版报告...</div>
    </div>

<script>
(function() {
    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function parseInline(text) {
        return escapeHtml(text)
            .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
    }

    let headingCount = 0;
    function parseMarkdown(md) {
        const lines = md.split('\n');
        let html = '', i = 0;
        while (i < lines.length) {
            let line = lines[i];
            if (line.trim() === '') { i++; continue; }

            // Code block
            if (line.startsWith('```')) {
                i++;
                const code = [];
                while (i < lines.length && !lines[i].startsWith('```')) {
                    code.push(lines[i]); i++;
                }
                i++;
                html += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>';
                continue;
            }

            // Table
            if (line.includes('|')) {
                const rows = [];
                while (i < lines.length && (lines[i].includes('|') || lines[i].trim() === '')) {
                    if (lines[i].trim() !== '') rows.push(lines[i]);
                    i++;
                }
                if (rows.length >= 1) {
                    let tbl = '<div class="table-wrapper"><table>';
                    rows.forEach((row, idx) => {
                        if (idx === 1 && row.replace(/[|\-\s]/g,'') === '') return;
                        const cells = row.split('|').map(c => c.trim()).filter(c => c !== '');
                        const tag = idx === 0 ? 'th' : 'td';
                        tbl += '<tr>' + cells.map(c => '<' + tag + '>' + parseInline(c) + '</' + tag + '>').join('') + '</tr>';
                    });
                    tbl += '</table></div>';
                    html += tbl;
                }
                continue;
            }

            // Headers with ID for TOC
            const h = line.match(/^(#{1,6})\s+(.+)$/);
            if (h) {
                const lv = h[1].length;
                const id = 'h-' + headingCount++;
                html += '<h' + lv + ' id="' + id + '">' + parseInline(h[2]) + '</h' + lv + '>';
                i++; continue;
            }

            // Horizontal rule
            if (line.trim() === '---') { html += '<hr>'; i++; continue; }

            // Blockquote
            if (line.startsWith('> ')) {
                const q = [];
                while (i < lines.length && lines[i].startsWith('> ')) {
                    q.push(lines[i].slice(2)); i++;
                }
                html += '<blockquote>' + parseInline(q.join(' ')) + '</blockquote>';
                continue;
            }

            // Unordered list
            if (line.startsWith('- ') || line.startsWith('* ')) {
                html += '<ul>';
                while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
                    html += '<li>' + parseInline(lines[i].slice(2)) + '</li>'; i++;
                }
                html += '</ul>'; continue;
            }

            // Ordered list
            if (/^\d+\.\s/.test(line)) {
                html += '<ol>';
                while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
                    html += '<li>' + parseInline(lines[i].replace(/^\d+\.\s/,'')) + '</li>'; i++;
                }
                html += '</ol>'; continue;
            }

            // Paragraph
            html += '<p>' + parseInline(line) + '</p>'; i++;
        }
        return html;
    }

    // Generate Table of Contents
    function generateTOC() {
        const headings = document.querySelectorAll('#content h2, #content h3');
        const toc = document.getElementById('toc');
        if (headings.length === 0) { toc.style.display = 'none'; return; }

        let html = '<div class="toc-title">目录</div><ul>';
        headings.forEach(function(h) {
            const cls = h.tagName === 'H2' ? 'toc-h2' : 'toc-h3';
            html += '<li class="' + cls + '"><a href="#' + h.id + '">' + escapeHtml(h.textContent) + '</a></li>';
        });
        html += '</ul>';
        toc.innerHTML = html;
    }

    // Highlight current TOC item on scroll
    function highlightTOC() {
        const headings = document.querySelectorAll('#content h2, #content h3');
        const tocLinks = document.querySelectorAll('.toc a');
        let current = '';
        headings.forEach(function(h) {
            if (h.getBoundingClientRect().top <= 100) current = h.id;
        });
        tocLinks.forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === '#' + current);
        });
    }

    // Reading progress bar
    function updateProgress() {
        const st = document.documentElement.scrollTop || document.body.scrollTop;
        const sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const pct = sh > 0 ? (st / sh) * 100 : 0;
        document.getElementById('progressFill').style.width = pct + '%';
    }

    // Setup back button based on "from" parameter
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const from = params.get('from');
    const backBtn = document.getElementById('backBtn');

    if (from && from.endsWith('.html') && !from.includes('..') && !from.includes(':') && !from.includes('/')) {
        backBtn.href = '/report/' + from;
        backBtn.textContent = '← 返回可视化报告';
    }

    if (!file || !file.endsWith('.md') || file.includes('..') || file.includes(':')) {
        document.getElementById('content').innerHTML = '<div class="error">请提供有效的 .md 文件路径</div>';
        return;
    }

    fetch(file)
        .then(function(r) { if (!r.ok) throw new Error('文件不存在'); return r.text(); })
        .then(function(text) {
            document.getElementById('content').innerHTML = parseMarkdown(text);
            generateTOC();
            window.addEventListener('scroll', function() {
                updateProgress();
                highlightTOC();
            });
            updateProgress();
        })
        .catch(function(err) {
            document.getElementById('content').innerHTML = '<div class="error">加载失败：' + escapeHtml(err.message) + '</div>';
        });
})();
</script>
</body>
</html>
