<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字版报告</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #020617 0%, #081021 30%, #0f1a30 70%, #1a253c 100%);
            background-attachment: fixed;
            color: #e2e8f0;
            line-height: 1.8;
            min-height: 100vh;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            background: #06b6d4;
            color: white;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #0891b2;
            transform: translateY(-2px);
        }
        .container {
            max-width: 840px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }
        .loading, .error {
            text-align: center;
            padding: 120px 0;
            font-size: 1.1rem;
        }
        .loading { color: #64748b; }
        .error { color: #ef4444; }

        /* Markdown 样式 */
        h1 { color: #fff; font-size: 2rem; margin: 0 0 1.5rem; font-weight: 700; }
        h2 { color: #06b6d4; font-size: 1.4rem; margin: 2.5rem 0 1rem; font-weight: 600; border-bottom: 1px solid rgba(71, 85, 105, 0.3); padding-bottom: 0.5rem; }
        h3 { color: #8b5cf6; font-size: 1.15rem; margin: 1.8rem 0 0.8rem; font-weight: 600; }
        p { margin-bottom: 1rem; color: #cbd5e1; }
        strong { color: #f1f5f9; font-weight: 600; }
        em { color: #94a3b8; }
        a { color: #06b6d4; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { border: none; border-top: 1px solid rgba(71, 85, 105, 0.4); margin: 2rem 0; }
        blockquote { border-left: 3px solid #06b6d4; padding: 0.5rem 0 0.5rem 1rem; margin: 1rem 0; background: rgba(30, 41, 59, 0.3); border-radius: 0 4px 4px 0; }
        blockquote p { margin: 0; color: #94a3b8; }
        ul, ol { margin: 1rem 0 1rem 1.5rem; }
        li { margin-bottom: 0.5rem; color: #cbd5e1; }
        code { background: rgba(30, 41, 59, 0.8); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #22d3ee; font-family: "SF Mono", Monaco, monospace; }
        pre { background: rgba(15, 23, 42, 0.8); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1rem 0; border: 1px solid rgba(71, 85, 105, 0.3); }
        pre code { background: none; padding: 0; color: #e2e8f0; }
        table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
        th, td { padding: 10px 14px; border: 1px solid rgba(71, 85, 105, 0.4); text-align: left; }
        th { background: rgba(30, 41, 59, 0.6); color: #06b6d4; font-weight: 600; }
        tr:nth-child(even) { background: rgba(30, 41, 59, 0.2); }
        tr:hover { background: rgba(255,255,255,0.03); }

        @media (max-width: 768px) {
            .container { padding: 80px 16px 60px; }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.2rem; }
            table { font-size: 0.8rem; }
            th, td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <a href="/report/" class="back-btn">← 返回报告列表</a>
    <div class="container">
        <div id="content" class="loading">正在加载文字版报告...</div>
    </div>

<script>
(function() {
    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function parseInline(text) {
        return escapeHtml(text)
            .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
    }
    function parseMarkdown(md) {
        const lines = md.split('\n');
        let html = '', i = 0;
        while (i < lines.length) {
            let line = lines[i];
            if (line.trim() === '') { i++; continue; }

            // Code block
            if (line.startsWith('```')) {
                i++;
                const code = [];
                while (i < lines.length && !lines[i].startsWith('```')) {
                    code.push(lines[i]); i++;
                }
                i++;
                html += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>';
                continue;
            }

            // Table
            if (line.includes('|')) {
                const rows = [];
                while (i < lines.length && (lines[i].includes('|') || lines[i].trim() === '')) {
                    if (lines[i].trim() !== '') rows.push(lines[i]);
                    i++;
                }
                if (rows.length >= 1) {
                    html += '<table>';
                    rows.forEach((row, idx) => {
                        if (idx === 1 && row.replace(/[|\-\s]/g,'') === '') return;
                        const cells = row.split('|').map(c => c.trim()).filter(c => c !== '');
                        const tag = idx === 0 ? 'th' : 'td';
                        html += '<tr>' + cells.map(c => '<' + tag + '>' + parseInline(c) + '</' + tag + '>').join('') + '</tr>';
                    });
                    html += '</table>';
                }
                continue;
            }

            // Headers
            const h = line.match(/^(#{1,6})\s+(.+)$/);
            if (h) {
                const lv = h[1].length;
                html += '<h' + lv + '>' + parseInline(h[2]) + '</h' + lv + '>';
                i++; continue;
            }

            // Horizontal rule
            if (line.trim() === '---') { html += '<hr>'; i++; continue; }

            // Blockquote
            if (line.startsWith('> ')) {
                const q = [];
                while (i < lines.length && lines[i].startsWith('> ')) {
                    q.push(lines[i].slice(2)); i++;
                }
                html += '<blockquote>' + parseInline(q.join(' ')) + '</blockquote>';
                continue;
            }

            // Unordered list
            if (line.startsWith('- ') || line.startsWith('* ')) {
                html += '<ul>';
                while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
                    html += '<li>' + parseInline(lines[i].slice(2)) + '</li>'; i++;
                }
                html += '</ul>'; continue;
            }

            // Ordered list
            if (/^\d+\.\s/.test(line)) {
                html += '<ol>';
                while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
                    html += '<li>' + parseInline(lines[i].replace(/^\d+\.\s/,'')) + '</li>'; i++;
                }
                html += '</ol>'; continue;
            }

            // Paragraph
            html += '<p>' + parseInline(line) + '</p>'; i++;
        }
        return html;
    }

    // Load and render
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file || !file.endsWith('.md') || file.includes('..') || file.includes(':')) {
        document.getElementById('content').innerHTML = '<div class="error">请提供有效的 .md 文件路径</div>';
        return;
    }
    fetch(file)
        .then(r => { if (!r.ok) throw new Error('文件不存在'); return r.text(); })
        .then(text => { document.getElementById('content').innerHTML = parseMarkdown(text); })
        .catch(err => { document.getElementById('content').innerHTML = '<div class="error">加载失败：' + escapeHtml(err.message) + '</div>'; });
})();
</script>
</body>
</html>
