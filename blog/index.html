<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - 昊辰的星辰大海</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/animate.css">
    <style>
        :root {
            --gold: #c9a962;
            --gold-light: #e8d5a3;
            --dark: #1a1a1a;
            --gray: #666666;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --sea-blue: #1e88e5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--light-gray);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }
        
        /* 科技感背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(135deg, rgba(30, 136, 229, 0.03) 0%, transparent 50%),
                linear-gradient(225deg, rgba(201, 169, 98, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, rgba(30, 136, 229, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(201, 169, 98, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, rgba(248, 249, 250, 0.9) 0%, rgba(255, 255, 255, 0.95) 100%);
            background-size: 400% 400%, 400% 400%, 100% 100%, 100% 100%, 100% 100%;
            z-index: -1;
        }
        
        /* 网格装饰 */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(30, 136, 229, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 136, 229, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }
        
        .blog-page {
            min-height: 100vh;
            padding: 60px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 标题区域 */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .page-header .gold-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            margin: 0 auto 20px;
            border-radius: 2px;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        
        .page-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }
        
        /* 文章卡片 */
        .articles-section {
            margin-bottom: 80px;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 30px;
            padding-left: 16px;
            border-left: 4px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(201, 169, 98, 0.3), transparent);
        }
        
        .article-card {
            background: var(--white);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        
        .article-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--sea-blue), rgba(30, 136, 229, 0.5));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(30, 136, 229, 0.12);
            border-color: rgba(30, 136, 229, 0.2);
        }
        
        .article-card:hover::before {
            transform: scaleX(1);
        }
        
        .article-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            transition: color 0.3s ease;
            line-height: 1.4;
        }
        
        .article-card:hover h3 {
            color: var(--sea-blue);
        }
        
        .article-card .article-meta {
            font-size: 0.85rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .article-card .article-meta::before {
            content: "📖";
            font-size: 0.9rem;
        }
        
        .article-card .arrow {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%) translateX(10px);
            color: var(--sea-blue);
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .article-card:hover .arrow {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        
        /* 二维码区域 */
        .qr-section {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }
        
        .qr-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--sea-blue), var(--gold));
        }
        
        .qr-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 12px;
        }
        
        .qr-section > p {
            color: var(--gray);
            margin-bottom: 30px;
        }
        
        .qr-wrapper {
            display: inline-block;
            padding: 20px;
            background: var(--light-gray);
            border-radius: 16px;
            position: relative;
        }
        
        .qr-wrapper::before,
        .qr-wrapper::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold);
        }
        
        .qr-wrapper::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }
        
        .qr-wrapper::after {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
        }
        
        .qr-wrapper img {
            width: 200px;
            height: 200px;
            display: block;
            border-radius: 8px;
        }
        
        .qr-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
            
            .article-card {
                padding: 24px;
            }
            
            .article-card .arrow {
                display: none;
            }
            
            .qr-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="blog-page">
        <div class="container">
            <!-- 标题 -->
            <div class="page-header animate-in">
                <div class="gold-line"></div>
                <h1>Blog</h1>
                <p>产品思考 · 行业洞察 · 技术解读</p>
            </div>
            
            <!-- 热门文章 -->
            <div class="articles-section animate-in delay-1">
                <h2 class="section-title">热门文章</h2>
                
                <a href="https://mp.weixin.qq.com/s/_YXRH1MraNDvrPkfTKA5mA" target="_blank" class="article-card">
                    <h3>舱驾融合到底是怎么回事儿</h3>
                    <p class="article-meta">来源：微信公众号「昊辰的星辰大海」</p>
                    <span class="arrow">→</span>
                </a>
                
                <a href="https://mp.weixin.qq.com/s/sIGEGxE16e-mOMrkYQD8Qg" target="_blank" class="article-card">
                    <h3>豆包AI手机很火，但智能汽车可能跑在了前面</h3>
                    <p class="article-meta">来源：微信公众号「昊辰的星辰大海」</p>
                    <span class="arrow">→</span>
                </a>
            </div>
            
            <!-- 二维码 -->
            <div class="qr-section animate-in delay-2">
                <h2>更多文章，请关注公众号查阅</h2>
                <p>扫码关注「昊辰的星辰大海」，获取更多优质内容</p>
                <div class="qr-wrapper">
                    <img src="/assets/blog/qrcode.jpg" alt="微信公众号二维码">
                </div>
                <p class="qr-hint">👆 长按识别二维码</p>
            </div>
        </div>
    </div>
</body>
</html>
