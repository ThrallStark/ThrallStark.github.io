<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - 昊辰的星辰大海</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #e0f2fe 30%, #f0f9ff 70%, #fafafa 100%);
            background-attachment: fixed;
            color: #1a1a1a;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .blog-page {
            min-height: 100vh;
            padding: 60px 20px;
            position: relative;
        }
        
        /* 科技感装饰 */
        .blog-page::before {
            content: "";
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, rgba(59, 130, 246, 0.04) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .blog-page::after {
            content: "";
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.1) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        /* 标题区域 */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .page-header .gold-line {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8, #7dd3fc);
            margin: 0 auto 16px;
            border-radius: 2px;
        }
        
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: 3px;
        }
        
        .page-header p {
            color: #666;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        
        /* 热门文章标题 */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: "";
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #0ea5e9, #38bdf8, #7dd3fc);
            border-radius: 2px;
        }
        
        /* 文章卡片 */
        .articles-section {
            margin-bottom: 60px;
        }
        
        .article-card {
            display: block;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        
        .article-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 136, 229, 0.15);
            border-color: rgba(30, 136, 229, 0.2);
        }
        
        .article-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
            transition: color 0.3s ease;
            line-height: 1.4;
        }
        
        .article-card:hover h3 {
            color: #1e88e5;
        }
        
        .article-card .source {
            font-size: 0.85rem;
            color: #999;
        }
        
        /* 二维码区域 */
        .qr-section {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }
        
        .qr-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
        }
        
        .qr-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .qr-section > p {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        
        .qr-wrapper {
            display: inline-block;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px dashed #ddd;
        }
        
        .qr-wrapper img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 6px;
        }
        
        .qr-hint {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.8rem;
            }
            
            .article-card {
                padding: 20px;
            }
            
            .qr-section {
                padding: 30px 20px;
            }
        }
        }
        }
        }
        }
        }

    </style>
</head>
<body>
    <div class="blog-page">
        <div class="container">
            <!-- 标题 -->

            </div>

            <div class="articles-section">

                <a href="https://mp.weixin.qq.com/s/_YXRH1MraNDvrPkfTKA5mA" target="_blank" class="article-card">

                    <p class="source">微信公众号「昊辰的星辰大海」</p>

                <a href="https://mp.weixin.qq.com/s/sIGEGxE16e-mOMrkYQD8Qg" target="_blank" class="article-card">

                    <p class="source">微信公众号「昊辰的星辰大海」</p>
                </a>
            </div>
            
            <!-- 二维码 -->
            <div class="qr-section">
                <h2>更多文章，请关注公众号查阅</h2>
                <p>扫码关注「昊辰的星辰大海」，获取更多优质内容</p>
                <div class="qr-wrapper">

            </div>
        </div>
