<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - 昊辰的星辰大海</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/animate.css">
    <style>
        :root {
            --gold: #c9a962;
            --gold-light: #e8d5a3;
            --dark: #1a1a1a;
            --gray: #666666;
            --light-gray: #f5f5f5;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--light-gray);
            color: var(--dark);
            line-height: 1.6;
        }
        
        .blog-page {
            min-height: 100vh;
            padding: 60px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 标题区域 */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .page-header .gold-line {
            width: 60px;
            height: 3px;
            background: var(--gold);
            margin: 0 auto 20px;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
        }
        
        .page-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }
        
        /* 文章卡片 */
        .articles-section {
            margin-bottom: 80px;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 30px;
            padding-left: 16px;
            border-left: 4px solid var(--gold);
        }
        
        .article-card {
            background: var(--white);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .article-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        
        .article-card:hover::before {
            transform: scaleX(1);
        }
        
        .article-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }
        
        .article-card:hover h3 {
            color: var(--gold);
        }
        
        .article-card .article-source {
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        .article-card .arrow {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .article-card:hover .arrow {
            opacity: 1;
        }
        
        /* 二维码区域 */
        .qr-section {
            background: var(--white);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        
        .qr-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 12px;
        }
        
        .qr-section p {
            color: var(--gray);
            margin-bottom: 30px;
        }
        
        .qr-wrapper {
            display: inline-block;
            padding: 20px;
            background: var(--light-gray);
            border-radius: 16px;
        }
        
        .qr-wrapper img {
            width: 200px;
            height: 200px;
            display: block;
        }
        
        .qr-hint {
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--gray);
        }
        
        /* 装饰 */
        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: -1;
        }
        
        .decoration.top-right {
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .decoration.bottom-left {
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(201, 169, 98, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
            
            .article-card {
                padding: 24px;
            }
            
            .article-card .arrow {
                display: none;
            }
            
            .qr-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="decoration top-right"></div>
    <div class="decoration bottom-left"></div>
    
    <div class="blog-page">
        <div class="container">
            <!-- 标题 -->
            <div class="page-header animate-in">
                <div class="gold-line"></div>
                <h1>Blog</h1>
                <p>产品思考 · 行业洞察 · 技术解读</p>
            </div>
            
            <!-- 热门文章 -->
            <div class="articles-section animate-in delay-1">
                <h2 class="section-title">热门文章</h2>
                
                <a href="https://mp.weixin.qq.com/s/_YXRH1MraNDvrPkfTKA5mA" target="_blank" class="article-card">
                    <h3>舱驾融合到底是怎么回事儿</h3>
                    <p class="article-source">来源：微信公众号「昊辰的星辰大海」</p>
                    <span class="arrow">→</span>
                </a>
                
                <a href="https://mp.weixin.qq.com/s/sIGEGxE16e-mOMrkYQD8Qg" target="_blank" class="article-card">
                    <h3>豆包AI手机很火，但智能汽车可能跑在了前面</h3>
                    <p class="article-source">来源：微信公众号「昊辰的星辰大海」</p>
                    <span class="arrow">→</span>
                </a>
            </div>
            
            <!-- 二维码 -->
            <div class="qr-section animate-in delay-2">
                <h2>更多文章，请关注公众号查阅</h2>
                <p>扫码关注「昊辰的星辰大海」，获取更多优质内容</p>
                <div class="qr-wrapper">
                    <!-- 请将您的公众号二维码图片放在 /assets/blog/qrcode.jpg -->
                    <img src="/assets/blog/qrcode.jpg" alt="微信公众号二维码" onerror="this.outerHTML='<div style=\'width:200px;height:200px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px;border:2px dashed #ccc;\'>请上传二维码图片<br>/assets/blog/qrcode.jpg</div>'">
                </div>
                <p class="qr-hint">长按识别二维码</p>
            </div>
        </div>
    </div>
    
    <script>
        // 添加点击动画
        document.querySelectorAll('.article-card').forEach(card => {
            card.addEventListener('click', function(e) {
                // 允许默认行为（跳转）
            });
        });
    </script>
</body>
</html>
